version: '3.9'

services:
  # ── Backend (Node.js + Nodemailer) ──────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gymos-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    env_file:
      - ./server/.env

  # ── Frontend (React → nginx) ─────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
    container_name: gymos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
