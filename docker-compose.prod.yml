version: '3.9'

services:
  # ── Backend ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gymos-backend
    restart: always
    expose:
      - "3001"
    environment:
      - PORT=3001
    env_file:
      - ./server/.env
    networks:
      - gymos-network

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: gymos-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - gymos-network

networks:
  gymos-network:
    driver: bridge
